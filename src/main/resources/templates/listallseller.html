<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Management</title>

<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:'Poppins',sans-serif;
}

body{
	background:#f1f5f9;
	color:#0f172a;
	min-height:100vh;
	padding:30px;
}

.container{
	max-width:1400px;
	margin:auto;
}

.header{
	display:flex;
	justify-content:space-between;
	align-items:center;
	margin-bottom:30px;
}

.header-left h1{
	font-size:2.2rem;
	color:#0f172a;
	margin-bottom:5px;
}

.header-left p{
	color:#64748b;
}

.header-actions{
	display:flex;
	gap:15px;
}

.home-btn,
.add-btn{
	padding:12px 20px;
	border-radius:10px;
	text-decoration:none;
	font-weight:600;
	color:white;
	transition:.3s;
}

.home-btn{
	background:#0f172a;
	color:white;
}

.home-btn:hover{
	background:#1e293b;
	transform:translateY(-2px);
}

.add-btn{
	background:#d4af37;
	color:#0f172a;
}

.add-btn:hover{
	background:#f5c542;
	transform:translateY(-2px);
}

.stats-card{
	background:#ffffff;
	padding:25px;
	border-radius:18px;
	display:flex;
	align-items:center;
	gap:20px;
	margin-bottom:25px;
	border:1px solid #e2e8f0;
}

.stats-card i{
	font-size:42px;
	color:#d4af37;
}

.stats-card h2{
	font-size:2rem;
	color:#0f172a;
}

.stats-card p{
	color:#64748b;
}

.search-section{
	background:#ffffff;
	padding:20px;
	border-radius:18px;
	margin-bottom:25px;
	border:1px solid #e2e8f0;
}

.search-form{
	display:flex;
	gap:12px;
}

.search-form input{
	background:#ffffff;
	color:#0f172a;
	border:1px solid #e2e8f0;
	flex:1;
	padding:14px;
	border-radius:10px;
}

.search-form button{
	padding:14px 25px;
	border:none;
	border-radius:10px;
	background:#0f172a;
	color:white;
	font-weight:600;
	cursor:pointer;
}

.search-form button:hover{
	background:#1e293b;
}

.table-container{
	background:#ffffff;
	border-radius:18px;
	padding:20px;
	border:1px solid #e2e8f0;
	overflow-x:auto;
}

table{
	width:100%;
	border-collapse:collapse;
}

thead{
	background:#f8fafc;
}

th{
	padding:16px;
	color:#0f172a;
	text-align:left;
	font-weight:600;
}

td{

	color:#334155;
	padding:16px;
	border-bottom:1px solid rgba(255,255,255,0.08);
}

tr:hover{
	color:#334155;
}

.status-active{
	background:#dcfce7;
	color:#166534;
	padding:6px 12px;
	border-radius:20px;
	font-size:12px;
	font-weight:600;
}

.status-inactive{
	background:#fee2e2;
	color:#991b1b;
	padding:6px 12px;
	border-radius:20px;
	font-size:12px;
	font-weight:600;
}

.action-btn{
	text-decoration:none;
	padding:8px 12px;
	border-radius:8px;
	font-size:14px;
	font-weight:500;
	margin-right:6px;
}

.edit-btn{
	background:#d4af37;
	color:#0f172a;
}

.delete-btn{
	background:#dc2626;
	color:white;
}
.delete-btn:hover{
	background:#b91c1c;
}

.edit-btn:hover,
.delete-btn:hover{
	opacity:.9;
}

.stats-card,
.search-section,
.table-container{
	box-shadow:0 8px 25px rgba(15,23,42,.12);
}

@media(max-width:768px){

	.header{
		flex-direction:column;
		gap:20px;
		align-items:flex-start;
	}

	.search-form{
		flex-direction:column;
	}
}

</style>

</head>

<body>

<div class="container">

	<div class="header">

		<div class="header-left">
			<h1>Seller Management</h1>
			<p>Manage all registered vendors and suppliers</p>
		</div>

		<div class="header-actions">

			<a href="/admin-dashboard" class="home-btn">
				<i class="fas fa-home"></i> Dashboard
			</a>

			<a href="/newseller" class="add-btn">
				<i class="fas fa-plus"></i> Add Seller
			</a>

		</div>

	</div>

	<div class="stats-card">

		<i class="fas fa-users"></i>

		<div>
			<h2 th:text="${sellers.size()}">0</h2>
			<p>Total Sellers</p>
		</div>

	</div>

	<div class="search-section">

		<form action="/seller/search" method="get" class="search-form">

			<input type="text"
				   name="keyword"
				   placeholder="Search Seller ID or Company Name..."
				   required>

			<button type="submit">
				<i class="fas fa-search"></i> Search
			</button>

		</form>

	</div>

	<div class="table-container">

		<table>

			<thead>

				<tr>
					<th>Seller ID</th>
					<th>Company Name</th>
					<th>Contact</th>
					<th>Email</th>
					<th>GSTIN</th>
					<th>Vendor Status</th>
					<th>Actions</th>
				</tr>

			</thead>

			<tbody>

				<tr th:each="seller : ${sellers}">

					<td th:text="${seller.sellerId}"></td>

					<td th:text="${seller.companyName}"></td>

					<td th:text="${seller.contactNo}"></td>

					<td th:text="${seller.emailId}"></td>

					<td th:text="${seller.GSTIN}"></td>

					<td
						 th:text="${seller.vendorStatus}">
							 
					</td>

					<td>

						<a th:href="@{/seller/{SellerId}/edit(SellerId=${seller.sellerId})}"
						   class="action-btn edit-btn">

							<i class="fas fa-edit"></i> Edit

						</a>

						<a th:href="@{/seller/{SellerId}/delete(SellerId=${seller.sellerId})}"
						   class="action-btn delete-btn"
						   onclick="return confirm('Are you sure you want to delete this seller?')">

							<i class="fas fa-trash"></i> Delete

						</a>

					</td>

				</tr>

			</tbody>

		</table>

	</div>

</div>

</body>
</html>

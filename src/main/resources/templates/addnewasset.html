<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Asset</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:#f1f5f9;
			color:#0f172a;
            min-height:100vh;
            padding:30px;
        }

        /* Background Glow */
        body::before{
            content:'';
            position:fixed;
            top:-150px;
            right:-150px;
            width:400px;
            height:400px;
            background:rgba(212,175,55,0.05);
            border-radius:50%;
            filter:blur(80px);
            z-index:0;
        }

        body::after{
            content:'';
            position:fixed;
            bottom:-150px;
            left:-150px;
            width:400px;
            height:400px;
            background:rgba(15,23,42,0.04);
            border-radius:50%;
            filter:blur(80px);
            z-index:0;
        }

        .page-wrapper{
            position:relative;
            z-index:2;
            width:100%;
            max-width:1400px;
            margin:auto;
        }

        /* Header */

        .header{
            display:flex;
		    justify-content:space-between;
		    align-items:center;
		    gap:20px;
		    margin-bottom:30px;
		    padding:0 10px;
        }
        
        .header-left{
        	display:flex;
        	flex-direction:column;
        	gap:8px;
        }

        .header h1{
            font-size:2.2rem;
            color:#0f172a;
            margin-bottom:8px;
        }

        .header p{
            color:#64748b;
            font-size:0.95rem;
            margin:0;
        }
        
        .header-buttons{
    		display:flex;
    		gap:15px;
		}

		.home-btn{
		    display:inline-flex;
		    align-items:center;
		    gap:10px;
		    padding:14px 22px;
		    border-radius:12px;
		    background:#0f172a;
    		color:white;
		    text-decoration:none;
		    font-weight:700;
		    font-size:0.95rem;
		    transition:0.3s ease;
		    box-shadow:0 8px 20px rgba(212,168,67,0.25);
		}
		
		.home-btn:hover{
		    background:#1e293b;
		    transform:translateY(-2px);
		}

        /* Layout */

        .dashboard-grid{
            display:flex;
            flex-direction: column;
            gap:25px;
        }

        /* Cards */

        .card{
            background:#ffffff;
            border:1px solid #e2e8f0;
            border-radius:20px;
            padding:25px;
            box-shadow:0 10px 40px rgba(0,0,0,0.35);
        }

        .card-title{
            display:flex;
            align-items:center;
            gap:10px;
            margin-bottom:25px;
            font-size:1.2rem;
            font-weight:600;
            color:#0f172a;
        }

        /* Form */

        .form-group{
            margin-bottom:18px;
        }

        .form-group label{
            display:block;
            margin-bottom:8px;
            font-size:0.9rem;
            color:#475569;
            font-weight:500;
        }

        .input-wrapper{
            position:relative;
        }

        .input-wrapper i{
            position:absolute;
            top:50%;
            left:14px;
            transform:translateY(-50%);
            color:#64748b;
            font-size:14px;
        }

        .form-control{
            width:100%;
            background:#ffffff;
			border:1px solid #e2e8f0;
			color:#0f172a;
            border-radius:10px;
            padding:13px 14px 13px 42px;
            font-size:0.95rem;
            transition:0.3s ease;
        }
        
        select.form-control{
		    width:100%;
		    padding:14px 14px 14px 45px;
		    border-radius:12px;
		    background:#ffffff;
			border:1px solid #e2e8f0;
			color:#0f172a;
		    font-size:1rem;
		    appearance:none;
		}

        .form-control:focus{
            outline:none;
            border-color:#d4af37;
			box-shadow:0 0 0 4px rgba(212,175,55,.15);
        }

        .form-control::placeholder{
            color:#64748b;
        }

        /* Button */

        .btn-submit{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#d4af37;
			color:#0f172a;
            font-size:1rem;
            font-weight:700;
            cursor:pointer;
            transition:0.3s ease;
            margin-top:10px;
        }

        .btn-submit:hover{
            background:#f5c542;
            transform:translateY(-2px);
        }

        /* Table */

        .table-container{
            overflow-x:auto;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:14px;
        }

        thead{
            background:#1E3250;
        }

        thead th{
            padding:16px;
            text-align:left;
            color:#D4A843;
            font-size:0.9rem;
            font-weight:600;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }

        tbody tr{
            transition:0.2s ease;
        }

        tbody tr:hover{
            background:rgba(255,255,255,0.03);
        }

        tbody td{
            padding:15px;
            border-bottom:1px solid rgba(255,255,255,0.05);
            color:#DCE3EA;
            font-size:0.92rem;
        }

        /* Status Badge */

        .status-badge{
            padding:6px 12px;
            border-radius:50px;
            font-size:0.8rem;
            font-weight:600;
            display:inline-block;
            background:rgba(0,170,255,0.12);
            color:#53C5FF;
        }

        /* Responsive */

        @media(max-width:1100px){

            .dashboard-grid{
                grid-template-columns:1fr;
            }
        }

        @media(max-width:768px){

            body{
                padding:15px;
            }

            .card{
                padding:20px;
            }

            .header h1{
                font-size:1.7rem;
            }
        }

    </style>
</head>

<body>

<div class="page-wrapper">

    <!-- Header -->

    <div class="header">
    	<div class="header-left">
        <h1>Asset Management</h1>
        <p>Add and manage organization assets efficiently.</p>
    </div>
    <div class="header-buttons">
        <a href="/admin-dashboard"
           class="home-btn">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>
    </div>
	</div>

    <div class="dashboard-grid">

        <!-- Left Card : Add Asset -->

        <div class="card">

            <div class="card-title">
                <i class="fa-solid fa-plus"></i>
                <span>Add New Asset</span>
            </div>

            <form action="/saveasset"
                  method="post"
                  enctype="multipart/form-data"
                  th:object="${asset}">

                <div class="form-group">
				    <label>Product ID</label>
				    <div class="input-wrapper">
				        <i class="fa-solid fa-box"></i>
				        <select class="form-control"
				                th:field="*{product.productId}"
				                required>
				            <option value="">
				                Select Product
				            </option>
				            <option th:each="p : ${products}"
						        th:value="${p.productId}"
						        th:text="${p.productId + ' - ' + p.productName}">
						</option>
				        </select>
				    </div>
				</div>

                <div class="form-group">
				    <label>Employee ID</label>
				    <div class="input-wrapper">
				        <i class="fa-solid fa-user"></i>
				        <select class="form-control"
				                th:field="*{employee.employeeId}">
				            <option value="">
				                Select Employee
				            </option>
				            <option th:each="emp : ${employees}"
				                    th:value="${emp.employeeId}"
				                    th:text="${emp.employeeId + ' - ' + emp.Name}">
				            </option>
				        </select>
				    </div>
				</div>

                <div class="form-group">
                    <label>Location</label>

                    <div class="input-wrapper">
                        <i class="fa-solid fa-location-dot"></i>

                        <select class="form-control"
        						th:field="*{location.locationId}"
        						required>

    					<option value="">
        					Select Location
    					</option>
			    		<option th:each="loc : ${locations}"
			            th:value="${loc.locationId}"
			            th:text="${loc.location_name}">
   						</option>
						</select>
                    </div>
                </div>
                
                <div class="form-group">
				    <label>Department</label>
				    <div class="input-wrapper">
				        <i class="fa-solid fa-building"></i>
				        <select class="form-control"
						    	th:field="*{department}"
						        required>
						
						    <option value="">
						        Select Department
						    </option>
						
						    <option value="Blasting Division">
						        Blasting Division
						    </option>
						
						    <option value="Business Development">
						        Business Development
						    </option>
						
						    <option value="C M P">
						        C M P
						    </option>
						
						    <option value="CC Lab">
						        CC Lab
						    </option>
						
						    <option value="CED">
						        CED
						    </option>
						    
						    <option value="CMC">
						        CMC
						    </option>
						    
						    <option value="CMD Secreteriat">
						        CMD Secreteriat
						    </option>
						    
						    <option value="CMP Lab">
						        CMP Lab
						    </option>
						    
						    <option value="CT & LAB">
						        CT & LAB
						    </option>
						    
						    <option value="Civil">
						        Civil
						    </option>
						    
						    <option value="Company Secreteriat">
						        Company Secreteriat
						    </option>
						    
						    <option value="Director(T/CRD) Secreteriat">
						        Director(T/CRD) Secreteriat
						    </option>
						    
						    <option value="Director(T/ES) Secreteriat">
						        Director(T/ES) Secreteriat
						    </option>
						    
						    <option value="Director(T/P&D) Secreteriat">
						        Director(T/P&D) Secreteriat
						    </option>
						    
						    <option value="Director(T/RD&T) Secreteriat">
						        Director(T/RD&T) Secreteriat
						    </option>
						    
						    <option value="Dispensary">
						        Dispensary
						    </option>
						    
						    <option value="E & M">
						        E & M
						    </option>
						    
						    <option value="Environment">
						        Environment
						    </option>
						    
						    <option value="Exploration">
						        Exploration
						    </option>
						    
						    <option value="H R D/ S T C">
						        H R D/ S T C
						    </option>
						    
						    <option value="I C T">
						        I C T
						    </option>
						    
						    <option value="I M S">
						        I M S
						    </option>
						    
						    <option value="IAD">
						        IAD
						    </option>
						    
						    <option value="MSD">
						        MSD
						    </option>
						    
						    <option value="Materials Management(P)">
						       	Materials Management(P)
						    </option>
						    
						    <option value="Materials Management(Stores)">
						        Materials Management(Stores)
						    </option>
						    
						    <option value="Mining Electronics">
						        Mining Electronics
						    </option>
						    
						    <option value="NACCER">
						        NACCER
						    </option>
						    
						    <option value="Open Cast">
						        Open Cast
						    </option>
						    
						    <option value="P A D">
						        P A D
						    </option>
						    
						    <option value="P&A">
						        P&A
						    </option>
						    
						    <option value="S&T">
						        S&T
						    </option>
						    
						    <option value="Security">
						        Security
						    </option>
						    
						    <option value="Technical Secreteriat">
						        Technical Secreteriat
						    </option>
						    
						    <option value="Town Engineering">
						        Town Engineering
						    </option>
						    
						     <option value="U M D">
						        U M D
						    </option>
						    
						     <option value="Vigilance">
						        Vigilance
						    </option>
						    
						     <option value=" e-P & CM">
						        e-P & CM
						    </option>
						
						</select>
				    </div>
				</div>

                <div class="form-group">
                    <label>Status</label>

                    <div class="input-wrapper">
                        <i class="fa-solid fa-circle-check"></i>

                        <input type="text"
                               class="form-control"
                               th:field="*{status}"
                               placeholder="Assigned / Available / Expired "
                               required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Save Asset
                </button>

            </form>
        </div>
		</div>
    </div>
</body>
</html>

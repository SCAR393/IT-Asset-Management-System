<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Provisional Survey</title>

<!-- Bootstrap CSS -->
<link href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    background:#f4f6f9;
}

.sidebar{
    height:100vh;
    background:#0d6efd;
    color:white;
    padding-top:20px;
}

.sidebar h3{
    text-align:center;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    padding:15px;
    text-decoration:none;
    transition:0.3s;
}

.sidebar a:hover{
    background:white;
    color:#0d6efd;
}

.card{
    margin-top:40px;
    border:none;
    border-radius:15px;
    box-shadow:0px 4px 20px rgba(0,0,0,0.1);
}

.card-header{
    background:#0d6efd;
    color:white;
    font-size:24px;
    font-weight:bold;
    border-radius:15px 15px 0 0 !important;
}

.btn-save{
    background:#0d6efd;
    color:white;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

    <!-- SIDEBAR -->
    <div class="col-md-2 sidebar">

        <h3>AMS</h3>

        <a href="#">
            <i class="fa fa-home"></i>
            Dashboard
        </a>

        <a href="#">
            <i class="fa fa-box"></i>
            Assets
        </a>

        <a href="#">
            <i class="fa fa-file"></i>
            Surveys
        </a>

        <a href="#">
            <i class="fa fa-user"></i>
            Employees
        </a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="col-md-10">

        <div class="card">

            <div class="card-header">
                Provisional Survey Form
            </div>

            <div class="card-body">

                <form
                    th:action="@{/provisional-survey/save}"
                    th:object="${survey}"
                    method="post">

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">
                                Surveyor Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{surveyorName}" />

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Asset Condition
                            </label>

                            <select class="form-control"
                                    th:field="*{assetCondition}">

                                <option value="">
                                    Select Condition
                                </option>

                                <option value="GOOD">
                                    GOOD
                                </option>

                                <option value="DAMAGED">
                                    DAMAGED
                                </option>

                                <option value="SCRAP">
                                    SCRAP
                                </option>

                            </select>

                        </div>

                    </div>

                    <br>

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">
                                Estimated Repair Cost
                            </label>

                            <input type="number"
                                   class="form-control"
                                   th:field="*{estimatedRepairCost}" />

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">
                                Estimated Scrap Value
                            </label>

                            <input type="number"
                                   class="form-control"
                                   th:field="*{estimatedScrapValue}" />

                        </div>

                    </div>

                    <br>

                    <label class="form-label">
                        Recommendation
                    </label>

                    <textarea class="form-control"
                              rows="4"
                              th:field="*{recommendation}">
                    </textarea>

                    <br>

                    <button type="submit"
                            class="btn btn-save">

                        <i class="fa fa-save"></i>

                        Save Survey

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</div>

</body>
</html>

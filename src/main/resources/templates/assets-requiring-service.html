<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets Requiring Service</title>
    <style>

:root{
    --primary:#0f172a;
    --secondary:#1e293b;
    --gold:#d4af37;
    --bg:#f1f5f9;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:Arial,sans-serif;
}

.container{
    width:95%;
    margin:25px auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.page-title{
    color:#0f172a;
    font-size:32px;
    font-weight:bold;
}

.dashboard-btn{
    text-decoration:none;
    color:white;
    padding:12px 20px;
    border-radius:10px;
    font-weight:600;
    background:#0f172a;
}

.dashboard-btn:hover{
    background:#1e293b;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:
        0 8px 25px rgba(0,0,0,.08);
   border:1px solid #e2e8f0;
}

.card-header{
    background:#0f172a;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.card-header h2{
    font-size:24px;
}

.count-badge{
    background:#fef3c7;
	color:#92400e;
    padding:8px 15px;
    border-radius:25px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#f8fafc;
}

th{
    padding:15px;
    text-align:center;
    color:var(--primary);
    border-bottom:2px solid #e5e7eb;
}

td{ 
	color:#334155;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #ececec;
}

tbody tr{
    transition:.3s;
}

tbody tr:hover{
    background:#f8fbff;
}

.status-badge{
    background:#ffedd5;
    color:#9a3412;
    padding:7px 14px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.assign-btn{
    background:#15803d;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
}

.assign-btn:hover{
    background:#166534;
}

.empty-state{
    padding:40px;
    text-align:center;
    color:#64748b;
    font-size:18px;
}

</style>
</head>
<body>

<div class="container">

    <div class="header">

        <h1 class="page-title">

            <i class="fas fa-tools"></i>

            Assets Requiring Service

        </h1>

        <a href="/admin-dashboard"
           class="dashboard-btn">

            <i class="fas fa-home"></i>

            Dashboard

        </a>

    </div>

    <div class="card">

        <div class="card-header">

            <h2>

                Service Queue

            </h2>

            <div class="count-badge">

                Total :
                <span th:text="${assets.size()}">
                    0
                </span>

            </div>

        </div>

        <table>

            <thead>

            <tr>

                <th>Asset ID</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Employee ID</th>
                <th>Employee Name</th>
                <th>Location</th>
                <th>Status</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="asset : ${assets}">

                <td th:text="${asset.assetId}"></td>

                <td th:text="${asset.product.productId}"></td>

                <td th:text="${asset.product.productName}"></td>

                <td th:text="${asset.employee.employeeId}"></td>

                <td th:text="${asset.employee.name}"></td>

                <td th:text="${asset.location.locationName}"></td>

                <td>

                    <span class="status-badge">

                        <i class="fas fa-wrench"></i>

                        Service Required

                    </span>

                </td>

                <td>

                    <form
                      th:action="@{/asset/{id}/complete-service(id=${asset.assetId})}"
                      method="post">

                        <button type="submit"
                                class="assign-btn">

                            <i class="fas fa-check"></i>

                            Mark Assigned

                        </button>

                    </form>

                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(assets)}">

                <td colspan="8">

                    <div class="empty-state">

                        No assets currently require service.

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>

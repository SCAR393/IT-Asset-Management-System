<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f1f5f9;
			color:#0f172a;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh;
            padding:30px 20px;
        }

        /* Background Glow */

        body::before{
            content:'';
            position:fixed;
            top:-180px;
            right:-180px;
            width:450px;
            height:450px;
            background:rgba(212,175,55,0.05);
            border-radius:50%;
            filter:blur(90px);
            z-index:0;
        }

        body::after{
            content:'';
            position:fixed;
            bottom:-180px;
            left:-180px;
            width:450px;
            height:450px;
            background:rgba(15,23,42,0.04);
            border-radius:50%;
            filter:blur(90px);
            z-index:0;
        }

        .container{
            position:relative;
            z-index:2;
            width:100%;
            max-width:1200px;
            margin:auto;
        }

        /* Header */

        .page-header{
            margin-bottom:30px;
        }

        .page-header h1{
            color:#0f172a;
            font-size:2.3rem;
            margin-bottom:10px;
            font-weight:700;
        }

        .page-header p{
            color:#64748b;
            font-size:0.95rem;
        }
        
        
        .top-actions{
		    display:flex;
		    gap:15px;
		    margin-bottom:25px;
		}
		
		.nav-btn{
		    text-decoration:none;
		    background:#0f172a;
    		color:#ffffff;
		    padding:12px 22px;
		    border-radius:12px;
		    font-weight:700;
		    transition:.3s;
		}
		
		.nav-btn:hover{
		    background:#1e293b;
		    transform:translateY(-2px);
		}

        /* Card */

        .add-product-form{
            background:#ffffff;
            border-radius:22px;
            padding:35px;
            border:1px solid #e2e8f0;
            box-shadow:0 8px 25px rgba(15,23,42,.12);
        }

        /* Section */

        .section-title{
            color:#0f172a;
            font-size:1.1rem;
            margin:30px 0 20px;
            padding-bottom:10px;
            border-bottom:1px solid #e2e8f0;
        }

        /* Form Layout */

        .form-column{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
        }

        .form-group{
            flex:1 1 calc(50% - 20px);
        }

        .form-group.full-width{
            flex:1 1 100%;
        }

        /* Labels */

        .form-group label{
            display:block;
            margin-bottom:8px;
            color:#475569;
            font-size:0.92rem;
            font-weight:500;
        }

        /* Inputs */

        .form-group input,
        .form-group select{

            width:100%;
            padding:14px;
            border-radius:10px;
            background:#ffffff;
			border:1px solid #e2e8f0;
			color:#0f172a;
            font-size:15px;
            transition:0.3s ease;
        }

        .form-group input::placeholder{
            color:#64748b;
        }

        .form-group input:focus,
        .form-group select:focus{

            outline:none;
            border-color:#D4A843;
			box-shadow:0 0 0 4px rgba(212,168,67,0.12);
        }
        

        /* File Input */

        input[type="file"]{
            padding:12px;
            color:#64748b;
        }

        /* Button */

        .submit-btn{
            width:100%;
            margin-top:35px;
            padding:15px;
            border:none;
            border-radius:12px;
            background:#d4af37;
			color:#0f172a;
            font-size:1rem;
            font-weight:700;
            cursor:pointer;
            transition:0.3s ease;
        }

        .submit-btn:hover{
            background:#f5c542;
            transform:translateY(-2px);
        }

        /* Responsive */

        @media(max-width:768px){

            body{
                padding:15px;
            }

            .add-product-form{
                padding:22px;
            }

            .form-group{
                flex:1 1 100%;
            }

            .page-header h1{
                font-size:1.8rem;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- Header -->

    <div class="page-header">

        <h1>
            Add Product
        </h1>

        <p>
            Add and manage organization inventory products efficiently.
        </p>

    </div>
    
    <div class="top-actions">

    <a href="/admin-dashboard" class="nav-btn">
        <i class="fas fa-chart-line"></i>
        Dashboard
    </a>

    <a href="/listproduct" class="nav-btn">
        <i class="fas fa-boxes"></i>
        Products List
    </a>

	</div>

    <!-- Form Card -->

    <div class="add-product-form">

        <form th:action="@{/saveproduct}"
              th:object="${product}"
              method="post"
              enctype="multipart/form-data">

            <!-- Product Information -->

            <h3 class="section-title">
                Product Information
            </h3>

            <div class="form-column">

                <div class="form-group">
                    <label>Product Name</label>

                    <input type="text"
                           id="productName"
                           th:field="*{productName}"
                           placeholder="Enter Product Name"
                           required>
                </div>

                <div class="form-group">
                    <label>Seller</label>

                    <select id="sellerId"
                            th:field="*{sellerId}"
                            required>

                        <option value="">
                            Select Seller
                        </option>

                        <option th:each="seller : ${sellers}"
                                th:value="${seller.sellerId}"
                                th:text="${seller.companyName}">
                        </option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Brand Type</label>

                    <input type="text"
                           id="brandType"
                           th:field="*{brandType}"
                           placeholder="Enter Brand Type"
                           required>
                </div>

                <div class="form-group">
                    <label>Catalogue Status</label>

                    <select id="catalogueStatus"
                            th:field="*{catalogueStatus}"
                            required>

                        <option value="">
                            Select Status
                        </option>

                        <option value="Active">
                            Active
                        </option>

                        <option value="Inactive">
                            Inactive
                        </option>

                    </select>
                </div>

                <div class="form-group">
                    <label>Selling As</label>

                    <input type="text"
                           id="sellingAs"
                           th:field="*{sellingAs}"
                           placeholder="Unit / Bundle / Piece"
                           required>
                </div>

                <div class="form-group">
                    <label>Category Name</label>

                    <select id="categoryName"
					        th:field="*{categoryName}"
					        onchange="updateModels()"
					        required>
					
					    <option value="">Select Category</option>
					
					    <option value="PC">PC/Workstation</option>
					    <option value="Laptop">Laptop</option>
					    <option value="Printer">Printer/MFD</option>
					    <option value="Plotter">Plotter</option>
					    <option value="Scanner">Scanner</option>
					    <option value="Other">Other</option>
					
					</select>
                </div>

                <div class="form-group">
                    <label>Model</label>

                    <select id="model"
					        th:field="*{model}"
					        required>
					
					    <option value="">
					        Select Model
					    </option>
					
					</select>
                </div>

                <div class="form-group">
                    <label>HSN Code</label>

                    <input type="text"
                           id="hsnCode"
                           th:field="*{hsnCode}"
                           placeholder="Enter HSN Code"
                           required>
                </div>

            </div>

            <!-- Procurement Details -->

            <h3 class="section-title">
                Procurement Details
            </h3>

            <div class="form-column">

                <div class="form-group">
                    <label>Quantity</label>

                    <input type="number"
                           id="quantity"
                           th:field="*{quantity}"
                           placeholder="Enter Quantity"
                           oninput="calculateTotal()"
                           required>
                </div>
                <script>

				const modelMap = {
				
				    PC : [
				        "Dell All-in-one 5260",
				        "Dell All-in-one 7460",
				        "HP 400 G9 Tower Desktop",
				  		"HP 440 G9 AIO",
				  		"HP 600 G9 AIO",
				        "Acer Veriton M200 All-in-one PC",
				        "Acer Veriton Z4680G",
				        "Acer Veriton Z6640G All-in-one",
				        "Other PC Model"
				    ],
				
				    Laptop : [
				        "Dell Latitude 5440",
				        "HP EliteBook 840",
				        "Lenovo ThinkPad E14",
				        "Acer TravelMate",
				        "Asus ExpertBook"
				    ],
				
				    Printer : [
				        "HP 5200n A3 Laser Printer",
				        "HP CP 5225n A3 Color Laser Printer",
				        "HP Lj 1312nfi Color MFP",
				        "HP Lj PRO 200CM25/NW A4 Laser Color Printer",
				        "HP Lj PRO M706n A3 Laser Printer",
				        "Knoica Minolta Magicolor 7440 A3 Color Laser Printer",
				        "Brother HL-3040CN Color Laser Printer",
				        "Brother HL-5100DN A4 Laser Printer",
				        "Brother HL-5350DN Laser Printer",
				        "Brother L2701DW MFP",
				        "Brother MFC-L5900DW",
				        "Brother MFD MFC-L5915DW",
				        "Brother MFP Mono DCP-B7535DW",
				        "Ricoh SP250DN A4 Color Laser Printer",
				        "Ricoh SP6330 A3 Laser Printer",
				        "Samsung Laser MFP Xpress SL-M2880FW",
				        "Samsung M3320ND A4 Laser Printer",
				        "Samsung MFP SCX-4623FH/XIP",
				        "Samsung SLM 2876 FD A4 Laser MFD",
				        "Xerox WC 5335 A3 Laser MFD"
				    ],
				
				    Plotter : [
				    	"Canon ipf 831 Plotter",
				        "HP DesignJet T7200 PS Plotter",
				        "HP DesignJet T770 Plotter",
				        "HP DesignJet T790 Plotter",
				        "HP DesignJet Z5400 Plotter"
				    ],
				
				    Scanner : [
				        "Canon DR-F-120 A4 Scanner",
				        "Epson V33 A4 Scanner",
				        "HP ScanJet G3110 A4 Scanner",
				        "HP ScanJet N6310 A4 Scanner",
				      	"HP ScanJet N9120 A3 Scanner",
				        "Canon Lide 220 A4 Scanner",
				        "Colortrac SmartLF Ci40C Wide Format Scanner",
				        "Colortrac SmartLF SC 42 Wide Format Scanner",
				        "Colortrac 1Q Quatro 4450 Wide Format Scanner"
				    ],
				
				    Other : [
				        "Projector",
				        "Router",
				        "Switch",
				        "UPS",
				        "Monitor"
				    ]
				};
				
				function updateModels(){
				
				    const category =
				        document.getElementById("categoryName").value;
				
				    const modelSelect =
				        document.getElementById("model");
				
				    modelSelect.innerHTML =
				        '<option value="">Select Model</option>';
				
				    if(!modelMap[category]) return;
				
				    modelMap[category].forEach(model => {
				
				        let option =
				            document.createElement("option");
				
				        option.value = model;
				        option.textContent = model;
				
				        modelSelect.appendChild(option);
				    });
				}
				
				</script>

                <div class="form-group">
                    <label>Price</label>

                    <input type="number"
                           step="0.01"
                           id="price"
                           th:field="*{price}"
                           placeholder="Enter Price"
                           oninput="calculateTotal()"
                           required>
                </div>

                <div class="form-group">
                    <label>Warranty (Years)</label>

                    <input type="number"
                           id="warranty"
                           th:field="*{warranty}"
                           placeholder="Enter Warranty"
                           required>
                </div>

                <div class="form-group">
                    <label>Taxes</label>

                    <input type="number"
                           step="0.01"
                           id="taxes"
                           th:field="*{taxes}"
                           placeholder="Enter Taxes"
                           oninput="calculateTotal()"
                           required>
                </div>

                <div class="form-group">
                    <label>Total Amount</label>

                    <input type="number"
                           step="0.01"
                           id="total"
                           th:field="*{total}"
                           placeholder="Auto Calculated"
                           readonly>
                </div>

                <div class="form-group">
                    <label>Purchase Date</label>

                    <input type="date"
                           id="purchaseDate"
                           th:field="*{purchaseDate}"
                           required>
                </div>

            </div>

            <!-- Upload Documents -->

            <h3 class="section-title">
                Upload Documents
            </h3>

            <div class="form-column">

                <div class="form-group">
                    <label>Report 1 (PDF)</label>

                    <input type="file"
                           id="report1"
                           name="report1"
                           accept=".pdf">
                </div>

                <div class="form-group">
                    <label>Report 2 (PDF)</label>

                    <input type="file"
                           id="report2"
                           name="report2"
                           accept=".pdf">
                </div>

                <div class="form-group full-width">
                    <label>Product Image</label>

                    <input type="file"
                           id="image"
                           name="image"
                           accept=".jpeg,.jpg,.png">
                </div>

            </div>

            <!-- Submit Button -->

            <button type="submit" class="submit-btn">

                <i class="fa-solid fa-floppy-disk"></i>
                Save Product

            </button>

        </form>

    </div>

</div>

<script>

    function calculateTotal(){

        let quantity =
            parseFloat(
                document.getElementById("quantity").value
            ) || 0;

        let price =
            parseFloat(
                document.getElementById("price").value
            ) || 0;

        let taxes =
            parseFloat(
                document.getElementById("taxes").value
            ) || 0;

        let total =
            (price + taxes) * quantity;

        document.getElementById("total").value =
            total.toFixed(2);
    }

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets List</title>
    <style>

		:root{
		    --primary:#1e3c72;
		    --secondary:#2a5298;
		    --gold:#d4af37;
		    --bg:#eef3fa;
		}
		
		*{
		    margin:0;
		    padding:0;
		    box-sizing:border-box;
		}
		
		body{
		    background:var(--bg);
		    font-family:Arial,sans-serif;
		}
		
		.container{
		    width:95%;
		    margin:25px auto;
		}
		
		.header{
		    display:flex;
		    justify-content:space-between;
		    align-items:center;
		    margin-bottom:20px;
		}
		
		.page-title{
		    font-size:32px;
		    font-weight:bold;
		    color:var(--primary);
		}
		
		.dashboard-btn{
		    background:linear-gradient(
		        135deg,
		        var(--primary),
		        var(--secondary)
		    );
		    color:white;
		    text-decoration:none;
		    padding:12px 20px;
		    border-radius:10px;
		    font-weight:600;
		}
		
		.dashboard-btn:hover{
		    opacity:.9;
		}
		
		.card{
		    background:white;
		    border-radius:18px;
		    overflow:hidden;
		    box-shadow:
		        0 8px 25px rgba(0,0,0,.08);
		    border:2px solid rgba(212,175,55,.25);
		}
		
		.card-header{
		    background:linear-gradient(
		        135deg,
		        var(--primary),
		        var(--secondary)
		    );
		    color:white;
		    padding:20px;
		    display:flex;
		    justify-content:space-between;
		    align-items:center;
		}
		
		.count-badge{
		    background:var(--gold);
		    color:black;
		    padding:8px 15px;
		    border-radius:25px;
		    font-weight:bold;
		}
		
		.actions{
		    padding:20px;
		    display:flex;
		    gap:12px;
		}
		
		.download-btn{
		    text-decoration:none;
		    padding:12px 18px;
		    border-radius:10px;
		    color:white;
		    font-weight:600;
		}
		
		.csv-btn{
		    background:#28a745;
		}
		
		.pdf-btn{
		    background:#dc3545;
		}
		
		table{
		    width:100%;
		    border-collapse:collapse;
		}
		
		thead{
		    background:#f8f9fc;
		}
		
		th{
		    padding:15px;
		    text-align:center;
		    color:var(--primary);
		    border-bottom:2px solid #e5e7eb;
		}
		
		td{
		    padding:15px;
		    text-align:center;
		    border-bottom:1px solid #ececec;
		}
		
		tbody tr{
		    transition:.3s;
		}
		
		tbody tr:hover{
		    background:#f8fbff;
		}
		
		.status-badge{
		    padding:6px 14px;
		    border-radius:20px;
		    font-size:13px;
		    font-weight:600;
		}
		
		.assigned{
		    background:#e8f5e9;
		    color:#2e7d32;
		}
		
		.service{
		    background:#fff3cd;
		    color:#856404;
		}
		
		.available{
		    background:#e3f2fd;
		    color:#1565c0;
		}
		
		.empty-state{
		    text-align:center;
		    padding:40px;
		    color:#666;
		    font-size:18px;
		}

</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1 class="page-title">
            Employee Assets
        </h1>
        <a href="/admin-dashboard"
           class="dashboard-btn">
            Dashboard
        </a>
    </div>
    <div class="card">
        <div class="card-header">
            <h2>
                Assets Assigned to Employee
            </h2>
            <div class="count-badge">
                Total :
                <span th:text="${assets.size()}">0</span>
            </div>
        </div>
        <div class="actions">
            <a href="/downloadassets"
               class="download-btn csv-btn">
                Download CSV
            </a>
            <a href="/downloadassets/pdf"
               class="download-btn pdf-btn">
                Download PDF
            </a>
        </div>
        <table>
            <thead>
            <tr>
                <th>Asset ID</th>
                <th>Product ID</th>
                <th>Product Name</th>
                <th>Employee ID</th>
                <th>Employee Name</th>
                <th>Location</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="asset : ${assets}">
                <td th:text="${asset.assetId}"></td>
                <td th:text="${asset.product.productId}"></td>
                <td th:text="${asset.product.productName}"></td>
                <td th:text="${asset.employee != null ? asset.employee.employeeId : 'N/A'}"></td>
                <td th:text="${asset.employee != null ? asset.employee.name : 'N/A'}"></td>

                <td th:text="${asset.location != null ? asset.location.location_name : 'N/A'}"></td>
                <td>
                    <span class="status-badge"
                          th:classappend="
                          ${asset.status == 'Assigned'} ? ' assigned' :
                          (${asset.status == 'Servicing Required'} ? ' service' : ' available')"
                          th:text="${asset.status}">
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(assets)}">
                <td colspan="7">
                    <div class="empty-state">
                        No assets found for this employee.
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

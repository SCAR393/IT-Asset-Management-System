<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Employee Management</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            background:#f1f5f9;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color:white;
            min-height:100vh;
            padding:30px;
        }

        /* Background Glow */

        body::before{

            content:'';
            position:fixed;
            top:-150px;
            right:-150px;
            width:400px;
            height:400px;
            background: rgba(212,175,55,0.05);
            border-radius:50%;
            filter:blur(90px);
            z-index:0;
        }

        body::after{

            content:'';
            position:fixed;
            bottom:-150px;
            left:-150px;
            width:400px;
            height:400px;
            background: rgba(15,23,42,0.04);
            border-radius:50%;
            filter:blur(90px);
            z-index:0;
        }

        .wrapper{

            position:relative;
            z-index:2;
            max-width:1500px;
            margin:auto;
        }

        /* Header */

        .header{

            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            margin-bottom:30px;
        }

        .header-left h1{

            font-size:2.3rem;
            color:#0f172a;
            margin-bottom:10px;
        }

        .header-left p{

            color:#64748b;
            font-size:0.95rem;
        }

        /* Buttons */

        .top-buttons{

            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        .btn{

            display:inline-flex;
            align-items:center;
            gap:10px;

            padding:13px 18px;
            border-radius:12px;
            text-decoration:none;
            font-size:0.92rem;
            font-weight:600;
            transition:0.3s ease;
        }

        .dashboard-btn{
		    background:#0f172a;
		    color:#ffffff;
		}
        .dashboard-btn:hover{
            background:#1e293b;
            transform:translateY(-2px);
        }

        .add-btn{
		    background:#d4af37;
		    color:#0f172a;
		}

        .add-btn:hover{
            background:#f5c542;
            transform:translateY(-2px);
        }

        /* Card */

        .card{

            background:#ffffff;
            border-radius:22px;
            border:1px solid #e2e8f0;
            padding:28px;
            box-shadow:0 20px 45px rgba(0,0,0,0.35);
        }

        /* Controls */

        .controls{

            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:20px;
            margin-bottom:25px;
        }

        /* Search */

        .search-box{

            position:relative;
            width:350px;
        }

        .search-box input{

            width:100%;
            background:#ffffff;
			color:#0f172a;
			border:1px solid #e2e8f0;
            padding:14px 14px 14px 45px;
            font-size:0.95rem;
        }

        .search-box input:focus{

            outline:none;
            border-color:#d4af37;
            box-shadow:0 0 0 4px rgba(212,168,67,0.12);
        }

        .search-box i{

            position:absolute;
            left:15px;
            top:50%;
            transform:translateY(-50%);
            color:#64748b;
        }

        /* Upload */

        .upload-form{

            display:flex;
            align-items:center;
            gap:12px;
            flex-wrap:wrap;
        }

        .upload-form input[type="file"]{

            background:#ffffff;
			color:#64748b;
			border:1px solid #e2e8f0;
            padding:10px;
            border-radius:10px;
         
        }

        .upload-btn{

            background:#0f172a;
            color:white;
            border:none;
            padding:12px 18px;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
            transition:0.3s ease;
        }

        .upload-btn:hover{

            background:#1e293b;
        }

        /* Table */

        .table-container{

            overflow-x:auto;
        }

        table{

            width:100%;
            border-collapse:collapse;
        }

        thead{

            background:#f8fafc;
        }

        thead th{

            padding:16px;
            text-align:left;
            color:#0f172a;
            font-size:0.9rem;
            border-bottom:1px solid rgba(255,255,255,0.06);
        }

        tbody tr{

            border-bottom:1px solid rgba(255,255,255,0.05);
            transition:0.3s ease;
        }

        tbody tr:hover{

            background:#f8fafc;
        }

        tbody td{

            padding:16px;
            color:#334155;
            font-size:0.92rem;
        }

        /* Role Badge */

        .role-badge{

            display:inline-block;
            padding:7px 14px;
            border-radius:50px;
            font-size:0.8rem;
            font-weight:700;
        }

        .admin{
		    background:#fef3c7;
		    color:#92400e;
		}

        .employee{
		    background:#dbeafe;
		    color:#1e3a8a;
		}

        /* Action Buttons */

        .action-buttons{

            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .action-btn{

            padding:8px 14px;
            border-radius:8px;
            text-decoration:none;
            font-size:0.82rem;
            font-weight:600;
            transition:0.3s ease;
        }

        .view-btn{

            background:#0f172a;
            color:white;
        }

        .view-btn:hover{

            background:#1e293b;
        }

        .edit-btn{

            background:#d4af37;
			color:#0f172a;
        }

        .edit-btn:hover{

            background:#E8C06A;
        }

        .delete-btn{

           background:#dc2626;
            color:white;
        }

        .delete-btn:hover{

            background:#b91c1c;
        }

        /* Responsive */

        @media(max-width:768px){

            body{
                padding:15px;
            }

            .card{
                padding:20px;
            }

            .header{
                flex-direction:column;
                align-items:flex-start;
            }

            .controls{
                flex-direction:column;
                align-items:stretch;
            }

            .search-box{
                width:100%;
            }

            .header-left h1{
                font-size:1.8rem;
            }
        }

    </style>

</head>

<body>

<div class="wrapper">

    <!-- Header -->

    <div class="header">

        <div class="header-left">

            <h1>
                Employee Management
            </h1>

            <p>
                Manage employee accounts, assets and access permissions.
            </p>

        </div>

        <div class="top-buttons">

            <a href="/admin-dashboard"
               class="btn dashboard-btn">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </a>

            <a href="/adduser"
               class="btn add-btn">

                <i class="fa-solid fa-user-plus"></i>

                Add Employee

            </a>

        </div>

    </div>

    <!-- Main Card -->

    <div class="card">

        <!-- Controls -->

        <div class="controls">

            <!-- Search -->

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text"
                       id="searchInput"
                       placeholder="Search employees..."
                       onkeyup="searchEmployees()">

            </div>

            <!-- Upload -->

            <form action="/employees/upload"
                  method="post"
                  enctype="multipart/form-data"
                  class="upload-form">

                <input type="file"
                       name="file"
                       accept=".csv"
                       required>

                <button type="submit"
                        class="upload-btn">

                    <i class="fa-solid fa-upload"></i>

                    Upload CSV

                </button>

            </form>

        </div>

        <!-- Table -->

        <div class="table-container">

            <table>

                <thead>

                <tr>

                    <th>Employee ID</th>

                    <th>Name</th>

                    <th>Date Of Joining</th>

                    <th>Mobile</th>

                    <th>Role</th>

                    <th>Assets</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="employee : ${employees}">

                    <!-- Employee ID -->

                    <td th:text="${employee.employeeId}">
                        1001
                    </td>

                    <!-- Name -->

                    <td>

                        <strong th:text="${employee.name}">
                            Rahul Sharma
                        </strong>

                    </td>

                    <!-- DOJ -->

                    <td th:text="${employee.date_of_joining}">
                        2024-01-12
                    </td>

                    <!-- Mobile -->

                    <td th:text="${employee.phone_no}">
                        9876543210
                    </td>

                    <!-- Role -->

                    <td>

                        <span class="role-badge"

                              th:classappend="${employee.role == 'A'} ? 'admin' : 'employee'"

                              th:text="${employee.role == 'A'} ? 'Administrator' : 'Employee'">

                            Employee

                        </span>

                    </td>

                    <!-- Assets -->

                    <td>

                        <a th:href="@{/employees/{id}/assets(id=${employee.employeeId})}"
                           class="action-btn view-btn">

                            <i class="fa-solid fa-eye"></i>

                            View Assets

                        </a>

                    </td>

                    <!-- Actions -->

                    <td>

                        <div class="action-buttons">

                            <a th:href="@{/employees/{employeeId}/edit(employeeId=${employee.employeeId})}"
                               class="action-btn edit-btn">

                                <i class="fa-solid fa-pen"></i>

                                Edit

                            </a>

                            <a th:href="@{/employees/{employeeId}/delete(employeeId=${employee.employeeId})}"
                               class="action-btn delete-btn"
                               onclick="return confirm('Delete this employee?')">

                                <i class="fa-solid fa-trash"></i>

                                Delete

                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script>

    function searchEmployees(){

        let input =
            document.getElementById("searchInput")
            .value.toLowerCase();

        let rows =
            document.querySelectorAll("tbody tr");

        rows.forEach(row => {

            let text =
                row.innerText.toLowerCase();

            row.style.display =
                text.includes(input)
                ? ""
                : "none";
        });
    }

</script>

</body>

</html>
